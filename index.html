<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bracket GENERATOR — Interactive tournament bracket generator for single and double elimination tournaments.">
  <title>Bracket GENERATOR — Tournament Bracket Generator</title>

  <!-- Favicon (replace with your own) -->
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ═══════════════════════════════════════
       HEADER
       ═══════════════════════════════════════ -->
  <header class="header">
    <a href="/" class="logo-link">
      <!-- LOGO: Replace src with your logo PNG -->
      <img src="assets/logo.png" alt="Bracket GENERATOR Logo" class="logo-img">
      <div class="logo-text">BRACKET<span>GENERATOR</span></div>
    </a>
  </header>

  <!-- ═══════════════════════════════════════
       SETUP PANEL
       ═══════════════════════════════════════ -->
  <main>
    <div class="setup-panel" id="setupPanel">
      <div class="setup-card">
        <div class="section-label">Tournament Mode</div>
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="single" onclick="setMode('single')">Single Elimination</button>
          <button class="mode-btn" data-mode="double" onclick="setMode('double')">Double Elimination</button>
        </div>
        <div class="section-label">Add Teams</div>
        <div class="team-input-wrap">
          <input class="team-input" id="teamInput" type="text" placeholder="Enter team name..." maxlength="30" autocomplete="off">
          <span class="input-hint">⏎ Enter</span>
        </div>
        <div class="team-tags" id="teamTags"></div>
        <div class="team-count" id="teamCount">Add at least <strong>3</strong> teams to begin</div>
        <button class="generate-btn" id="generateBtn" disabled onclick="generateBracket()">GENERATE BRACKET</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
         BRACKET AREA
         ═══════════════════════════════════════ -->
    <div class="bracket-area" id="bracketArea">
      <div class="bracket-header">
        <div class="bracket-title" id="bracketTitle"></div>
        <button class="reset-btn" onclick="resetBracket()">← Back to Setup</button>
      </div>
      <div class="bracket-scroll">
        <div class="bracket-canvas" id="bracketCanvas"></div>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════
       LEADERBOARD OVERLAY
       ═══════════════════════════════════════ -->
  <div class="leaderboard-overlay" id="lbOverlay" onclick="if(event.target===this)closeLB()">
    <div class="leaderboard-card">
      <button class="lb-close" onclick="closeLB()">✕</button>
      <div class="lb-title">🏆 Final Standings</div>
      <div class="lb-subtitle" id="lbSubtitle"></div>
      <div id="lbRows"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════ -->
  <footer class="site-footer">
    <p class="footer-text">© 2026 Bytes and Bots. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/app.js"></script>

</body>
</html>
